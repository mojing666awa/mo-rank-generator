<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOCALOID Myth - 终极液态玻璃生成器</title>
    <!-- 引入 html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-highlight: rgba(255, 255, 255, 0.3);
            --text-white: #ffffff;
            --text-dark: #2c3e50;
            --accent-gold: #ffd700;
        }

        * { box-sizing: border-box; outline: none; }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* 防止双重滚动条 */
        }

        /* --- 布局容器 --- */
        .app-container {
            display: flex;
            flex: 1;
            height: 100%;
            overflow: hidden;
        }

        /* --- 左侧控制面板 --- */
        .controls {
            width: 350px;
            background: #252525;
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid #444;
            z-index: 10;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
        }

        .control-group { margin-bottom: 20px; border-bottom: 1px solid #444; padding-bottom: 15px; }
        .control-group h3 { margin-top: 0; font-size: 16px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        
        label { display: block; margin-bottom: 5px; font-size: 12px; color: #ccc; }
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 10px;
            background: #333;
            border: 1px solid #555;
            color: #fff;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        input:focus { border-color: var(--accent-gold); }

        .file-upload-btn {
            display: block;
            width: 100%;
            padding: 10px;
            background: #444;
            color: white;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            border: 1px dashed #777;
            margin-bottom: 10px;
        }
        .file-upload-btn:hover { background: #555; border-color: #fff; }

        /* --- 右侧预览区域 --- */
        .preview-area {
            flex: 1;
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: auto; /* 允许内容过大时滚动 */
            padding: 20px;
        }

        /* --- 核心榜单卡片 (要截图的部分) --- */
        #capture-target {
            width: 1280px; /* 固定宽度，保证出图质量 */
            height: 720px; /* 16:9 比例 */
            background-color: #333;
            background-size: cover;
            background-position: center;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            /* 默认背景图，如果没有上传图片 */
            background-image: linear-gradient(135deg, #f6d365 0%, #fda085 100%); 
            overflow: hidden;
            transform-origin: top left; /* 缩放基准点 */
        }

        /* 顶部标题区 */
        .header-title {
            position: absolute;
            top: 40px;
            left: 50px;
            font-size: 60px;
            font-weight: 900;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
            font-style: italic;
            letter-spacing: 2px;
            z-index: 2;
        }

        /* 右上角总分玻璃块 */
        .total-score-box {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 320px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 20px;
            text-align: right;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            z-index: 2;
        }
        .total-label { font-size: 18px; color: #eee; opacity: 0.8; margin-bottom: 5px; }
        .total-number { font-size: 56px; font-weight: bold; color: #fff; line-height: 1; text-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .total-rate { font-size: 14px; color: #ddd; margin-top: 5px; opacity: 0.7; }

        /* 底部信息栏 */
        .bottom-info-bar {
            position: absolute;
            bottom: 40px;
            left: 40px;
            right: 40px;
            display: flex;
            gap: 20px;
            z-index: 2;
        }

        /* 左下角排名大数字 */
        .rank-box {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 10px 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .rank-num { font-size: 80px; font-weight: 900; color: #fff; line-height: 0.8; }
        .rank-arrow { font-size: 40px; color: var(--accent-gold); margin-left: 10px; margin-top: -20px;}
        
        /* 歌曲详细信息 */
        .song-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .song-title { font-size: 32px; font-weight: bold; margin-bottom: 5px; }
        .song-author { font-size: 18px; opacity: 0.9; margin-bottom: 10px; }
        .song-dates { font-size: 14px; opacity: 0.7; display: flex; gap: 15px; }

        /* 右下角统计小方块 */
        .stats-mini-box {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px 25px;
            display: flex;
            gap: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .mini-stat-item { text-align: center; }
        .mini-stat-val { font-size: 24px; font-weight: bold; color: #fff; display: block; }
        .mini-stat-label { font-size: 12px; color: #ccc; display: block; margin-top: 4px; }

        /* 右侧数据列表列 */
        .data-list-col {
            position: absolute;
            top: 180px; /* 在总分下面 */
            right: 30px;
            width: 320px; /* 与总分同宽 */
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 2;
        }

        /* 单个液态玻璃数据条 */
        .glass-bar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
        }
        
        .bar-left { display: flex; align-items: center; gap: 10px; }
        .bar-icon { width: 24px; height: 24px; fill: #fff; opacity: 0.9; }
        .bar-name { font-size: 18px; color: #fff; font-weight: 500; }
        .bar-value { font-size: 20px; font-weight: bold; color: #fff; font-family: monospace; }

        /* --- 悬浮下载按钮 --- */
        .fab-download {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0, 114, 255, 0.4);
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s;
        }
        .fab-download:active { transform: scale(0.95); }
        .fab-download svg { width: 24px; height: 24px; fill: white; }

        /* --- 响应式适配 (手机端) --- */
        @media (max-width: 1000px) {
            .app-container { flex-direction: column; overflow-y: auto; }
            .controls { width: 100%; height: auto; max-height: 40vh; border-right: none; border-bottom: 1px solid #444; }
            .preview-area { height: 60vh; align-items: flex-start; }
            
            /* 让巨大的预览图在手机上能缩放下显示 */
            #capture-target {
                transform: scale(0.4); /* 默认缩小显示 */
                transform-origin: top center;
                margin-top: -200px; /* 修正缩放后的留白 */
            }
        }
    </style>
</head>
<body>
