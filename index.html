<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOCALOID Myth Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --glass-bg: rgba(255, 255, 255, 0.06); 
            --glass-border: rgba(255, 255, 255, 0.08); 
            --glass-shadow: 0 8px 32px rgba(0,0,0,0.25);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #080808; color: #fff; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { 
            width: 220px; 
            min-width: 220px; 
            background: rgba(10,10,10,0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid rgba(255,255,255,0.04);
            padding: 10px 12px; 
            overflow-y: auto; 
            z-index: 10; 
            display: flex; 
            flex-direction: column; 
            gap: 4px; 
        }
        .sidebar::-webkit-scrollbar { width: 2px; }
        .sidebar::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        .sidebar h2 { font-size: 11px; margin-bottom: 2px; color: #555; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
        .input-group { display: flex; flex-direction: column; gap: 1px; }
        .input-group label { font-size: 8px; color: #444; text-transform: uppercase; letter-spacing: 0.5px; }
        input[type="text"], input[type="number"], select { 
            background: rgba(255,255,255,0.04); 
            border: 1px solid rgba(255,255,255,0.05); 
            color: #ccc; 
            padding: 3px 6px; 
            border-radius: 4px; 
            font-size: 10px; 
            transition: 0.2s; 
            width: 100%; 
            height: 22px;
        }
        input:focus, select:focus { border-color: rgba(0, 180, 255, 0.25); background: rgba(255,255,255,0.06); }
        select option { background: #111; }

        .file-upload { position: relative; overflow: hidden; display: inline-block; width: 100%; }
        .file-upload input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }
        .btn { 
            background: rgba(255,255,255,0.04); 
            color: #888; 
            border: 1px solid rgba(255,255,255,0.05); 
            padding: 3px 6px; 
            border-radius: 4px; 
            cursor: pointer; 
            text-align: center; 
            font-size: 10px; 
            transition: 0.2s; 
            width: 100%; 
            display: block; 
            height: 22px;
            line-height: 14px;
        }
        .btn:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.1); }
        .btn-primary { 
            background: linear-gradient(135deg, #007bff, #0056b3); 
            border-color: #007bff; 
            color: white; 
            font-weight: 600; 
            margin-top: 2px; 
            padding: 4px 6px;
            font-size: 11px;
            height: 28px;
            line-height: 18px;
        }
        .btn-primary:hover { background: linear-gradient(135deg, #0088ff, #0066cc); }
        .btn-success {
            background: linear-gradient(135deg, #00b894, #00a381);
            border-color: #00b894;
            color: white;
            font-weight: 600;
            margin-top: 2px;
            padding: 4px 6px;
            font-size: 11px;
            height: 28px;
            line-height: 18px;
        }
        .btn-success:hover { background: linear-gradient(135deg, #00d2a0, #00b894); }
        .btn-danger {
            background: linear-gradient(135deg, #e17055, #d63031);
            border-color: #e17055;
            color: white;
            font-weight: 600;
            margin-top: 2px;
            padding: 4px 6px;
            font-size: 11px;
            height: 28px;
            line-height: 18px;
        }
        .btn-danger:hover { background: linear-gradient(135deg, #ff7675, #e17055); }

        hr { border:0; border-top:1px solid rgba(255,255,255,0.03); margin: 3px 0; }

        .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
        .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px; }
        .row4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 3px; }

        .btn-group { display: flex; gap: 4px; }
        .btn-group .btn { flex: 1; }

        .duration-row { display: flex; gap: 4px; align-items: center; }
        .duration-row input { flex: 1; }
        .duration-row label { font-size: 8px; color: #555; white-space: nowrap; }

        .preview-area { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #050505; 
            position: relative; 
            overflow: hidden; 
            padding: 8px; 
        }
        .preview-wrapper { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        #capture-target {
            width: 1280px; 
            height: 720px;
            background: linear-gradient(145deg, #0f0f1a, #161625);
            background-size: cover; 
            background-position: center;
            position: relative; 
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.95);
            border-radius: 12px;
            transform-origin: center center;
            display: flex; 
            flex-direction: column;
            flex-shrink: 0;
        }
        
        #bgVideo {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            display: none;
        }
        #bgVideo.active { display: block; }
        
        .overlay { 
            position: absolute; 
            inset: 0; 
            background: linear-gradient(145deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.10) 100%); 
            z-index: 1; 
        }

        .content-layer { 
            position: relative; 
            z-index: 2; 
            padding: 28px 36px 18px 36px; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
        }

        .header { display: flex; justify-content: space-between; align-items: flex-start; }
        .rank-info { display: flex; align-items: center; gap: 12px; }
        .rank-num { 
            font-size: 100px; 
            font-weight: 900; 
            line-height: 1; 
            color: #fff; 
            text-shadow: 0 4px 30px rgba(0,0,0,0.4); 
            font-style: italic; 
            letter-spacing: -3px; 
        }
        .trend-icon { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 48px; 
            height: 48px; 
            background: rgba(255,255,255,0.04); 
            border-radius: 50%; 
            backdrop-filter: blur(4px); 
            border: 1px solid rgba(255,255,255,0.05);
        }
        .trend-icon svg { width: 26px; height: 26px; }
        .trend-up { color: #2ed573; } 
        .trend-down { color: #ff4757; } 
        .trend-flat { color: #ffa502; }
        .trend-new { color: #ff6b81; font-size: 20px; font-weight: 900; letter-spacing: 1px; }
        
        .song-details { text-align: right; }
        .song-title { 
            font-size: 42px; 
            font-weight: 800; 
            color: #fff; 
            text-shadow: 0 2px 16px rgba(0,0,0,0.5); 
            letter-spacing: 1px; 
            line-height: 1.1; 
        }
        .song-author { 
            font-size: 22px; 
            color: rgba(255,255,255,0.6); 
            font-weight: 400; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.4); 
        }

        .total-score-box {
            align-self: flex-end;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 10px 30px;
            text-align: right;
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
            margin-bottom: 2px;
            margin-top: auto;
        }
        .total-label { font-size: 14px; color: rgba(255,255,255,0.4); letter-spacing: 3px; }
        .total-points { 
            font-size: 58px; 
            font-weight: 800; 
            color: #fff; 
            line-height: 1; 
            text-shadow: 0 2px 16px rgba(0,0,0,0.25); 
            font-family: 'Arial', sans-serif; 
        }
        .total-rate { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 1px; }

        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            margin-top: 4px;
        }
        .stat-item {
            background: rgba(255, 255, 255, 0.035);
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 8px 14px;
            display: flex; 
            align-items: center; 
            justify-content: space-between;
        }
        .stat-left { display: flex; align-items: center; gap: 8px; }
        .stat-icon { width: 18px; height: 18px; fill: rgba(255,255,255,0.45); flex-shrink: 0; }
        .stat-name { font-size: 13px; color: rgba(255,255,255,0.5); font-weight: 400; }
        .stat-value { 
            font-size: 20px; 
            font-weight: 700; 
            color: #fff; 
            font-family: 'Arial', sans-serif; 
            letter-spacing: 0.3px; 
        }

        .meta-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: 6px; 
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .meta-item { 
            font-size: 13px; 
            color: rgba(255,255,255,0.45); 
            display: flex; 
            align-items: center; 
            gap: 6px; 
        }
        .meta-item svg { width: 16px; height: 16px; fill: rgba(255,255,255,0.3); flex-shrink: 0; }
        .meta-val { color: rgba(255,255,255,0.85); font-weight: 600; margin-left: 1px; }

        /* 进度提示 */
        .progress-bar {
            display: none;
            height: 3px;
            background: #1a1a2e;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 4px;
        }
        .progress-bar.active { display: block; }
        .progress-bar .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00b894, #007bff);
            border-radius: 2px;
            transition: width 0.3s;
        }

        @media (max-width: 820px) {
            body { flex-direction: column; height: auto; overflow-y: auto; }
            .sidebar { 
                width: 100%; 
                min-width: unset; 
                max-height: 34vh; 
                border-right: none; 
                border-bottom: 1px solid rgba(255,255,255,0.03); 
                padding: 8px 10px;
            }
            .preview-area { height: 66vh; padding: 4px; }
            #capture-target { transform: scale(0.48); transform-origin: center center; border-radius: 8px; }
            .btn-group { flex-wrap: wrap; }
            .btn-group .btn { flex: 1 1 45%; }
        }
        @media (max-width: 480px) {
            #capture-target { transform: scale(0.30); }
            .sidebar { max-height: 30vh; padding: 6px 8px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>✦ 控制台</h2>
    
    <div class="input-group">
        <label>背景图片</label>
        <div class="file-upload btn">
            📁 上传图片
            <input type="file" id="bgInput" accept="image/*">
        </div>
    </div>
    <div class="input-group">
        <label>背景视频 (MP4)</label>
        <div class="file-upload btn">
            🎬 上传视频
            <input type="file" id="videoInput" accept="video/mp4,video/webm">
        </div>
    </div>

    <div class="row2">
        <div class="input-group"><label>排名</label><input type="number" id="inRank" value="1"></div>
        <div class="input-group"><label>趋势</label>
            <select id="inTrend">
                <option value="up">↑ 上升</option>
                <option value="down">↓ 下降</option>
                <option value="flat">— 持平</option>
                <option value="new">✦ NEW</option>
            </select>
        </div>
    </div>

    <div class="input-group"><label>歌曲</label><input type="text" id="inTitle" value="Myth" placeholder="歌名"></div>
    <div class="input-group"><label>作者</label><input type="text" id="inAuthor" value="Creator" placeholder="P主"></div>

    <hr>

    <div class="row2">
        <div class="input-group"><label>总分</label><input type="text" id="inTotal" value="1,000,000"></div>
        <div class="input-group"><label>达成率</label><input type="text" id="inRate" value="100%"></div>
    </div>

    <div class="row3">
        <div class="input-group"><label>播放</label><input type="text" id="inPlay" value="100,000"></div>
        <div class="input-group"><label>收藏</label><input type="text" id="inFav" value="50,000"></div>
        <div class="input-group"><label>投币</label><input type="text" id="inCoin" value="30,000"></div>
        <div class="input-group"><label>点赞</label><input type="text" id="inLike" value="40,000"></div>
        <div class="input-group"><label>评论</label><input type="text" id="inComment" value="5,000"></div>
        <div class="input-group"><label>转发</label><input type="text" id="inShare" value="2,000"></div>
    </div>

    <hr>

    <div class="row4">
        <div class="input-group"><label>上周</label><input type="text" id="inLastRank" value="-"></div>
        <div class="input-group"><label>在榜</label><input type="text" id="inWeeks" value="1"></div>
        <div class="input-group"><label>最高</label><input type="text" id="inPeak" value="1"></div>
        <div class="input-group"><label>投稿</label><input type="text" id="inDate" value="2023.10.01"></div>
    </div>

    <div class="duration-row">
        <label>⏱ 导出时长</label>
        <input type="number" id="exportDuration" value="4" min="1" max="60" step="1">
        <label style="font-size:8px; color:#555;">秒</label>
    </div>

    <div class="btn-group">
        <button class="btn btn-primary" onclick="downloadImage()">📸 图片</button>
        <button class="btn btn-success" onclick="exportVideo()">🎬 视频</button>
        <button class="btn btn-danger" onclick="stopExport()" id="stopBtn" style="display:none;">⏹ 停止</button>
    </div>
    <div class="progress-bar" id="progressBar">
        <div class="fill" id="progressFill"></div>
    </div>
</div>

<div class="preview-area">
    <div class="preview-wrapper" id="previewWrapper">
        <div id="capture-target">
            <video id="bgVideo" muted loop playsinline></video>
            <div class="overlay"></div>
            <div class="content-layer">
                
                <div class="header">
                    <div class="rank-info">
                        <div class="rank-num" id="outRank">1</div>
                        <div class="trend-icon" id="outTrend">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 14l5-5 5 5z"/></svg>
                        </div>
                    </div>
                    <div class="song-details">
                        <div class="song-title" id="outTitle">Myth</div>
                        <div class="song-author" id="outAuthor">Creator</div>
                    </div>
                </div>

                <div style="flex:1; min-height:20px;"></div>

                <div class="total-score-box">
                    <div class="total-label">TOTAL POINT</div>
                    <div class="total-points" id="outTotal">1,000,000</div>
                    <div class="total-rate" id="outRate">Rate: 100%</div>
                </div>

                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-left">
                            <svg class="stat-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            <span class="stat-name">播放</span>
                        </div>
                        <span class="stat-value" id="outPlay">100,000</span>
                    </div>
                    <div class="stat-item">
                        <div class="stat-left">
                            <svg class="stat-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                            <span class="stat-name">收藏</span>
                        </div>
                        <span class="stat-value" id="outFav">50,000</span>
                    </div>
                    <div class="stat-item">
                        <div class="stat-left">
                            <svg class="stat-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-.31-8.86c-1.77-.45-2.34-.94-2.34-1.67 0-.84.79-1.43 2.1-1.43 1.38 0 1.9.66 1.94 1.64h1.71c-.05-1.34-.87-2.57-2.49-2.97V5H10.9v1.69c-1.51.32-2.72 1.3-2.72 2.81 0 1.79 1.49 2.69 3.66 3.21 1.95.46 2.34 1.15 2.34 1.87 0 .53-.39 1.39-2.1 1.39-1.6 0-2.23-.72-2.32-1.64H8.04c.1 1.7 1.36 2.66 2.86 2.97V19h2.34v-1.67c1.52-.29 2.72-1.16 2.73-2.77-.01-2.2-1.9-2.96-3.66-3.42z"/></svg>
                            <span class="stat-name">投币</span>
                        </div>
                        <span class="stat-value" id="outCoin">30,000</span>
                    </div>
                    <div class="stat-item">
                        <div class="stat-left">
                            <svg class="stat-icon" viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-1.91l-.01-.01L23 10z"/></svg>
                            <span class="stat-name">点赞</span>
                        </div>
                        <span class="stat-value" id="outLike">40,000</span>
                    </div>
                    <div class="stat-item">
                        <div class="stat-left">
                            <svg class="stat-icon" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
                            <span class="stat-name">评论</span>
                        </div>
                        <span class="stat-value" id="outComment">5,000</span>
                    </div>
                    <div class="stat-item">
                        <div class="stat-left">
                            <svg class="stat-icon" viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
                            <span class="stat-name">转发</span>
                        </div>
                        <span class="stat-value" id="outShare">2,000</span>
                    </div>
                </div>

                <div class="meta-bar">
                    <div class="meta-item">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.31-8.86c-1.77-.45-2.34-.94-2.34-1.67 0-.84.79-1.43 2.1-1.43 1.38 0 1.9.66 1.94 1.64h1.71c-.05-1.34-.87-2.57-2.49-2.97V5H10.9v1.69c-1.51.32-2.72 1.3-2.72 2.81 0 1.79 1.49 2.69 3.66 3.21 1.95.46 2.34 1.15 2.34 1.87 0 .53-.39 1.39-2.1 1.39-1.6 0-2.23-.72-2.32-1.64H8.04c.1 1.7 1.36 2.66 2.86 2.97V19h2.34v-1.67c1.52-.29 2.72-1.16 2.73-2.77-.01-2.2-1.9-2.96-3.66-3.42z"/></svg>
                        上周 <span class="meta-val" id="outLastRank">-</span>
                    </div>
                    <div class="meta-item">
                        <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
                        在榜 <span class="meta-val" id="outWeeks">1</span> 周
                    </div>
                    <div class="meta-item">
                        <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                        最高 <span class="meta-val" id="outPeak">1</span>
                    </div>
                    <div class="meta-item">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-.31-8.86c-1.77-.45-2.34-.94-2.34-1.67 0-.84.79-1.43 2.1-1.43 1.38 0 1.9.66 1.94 1.64h1.71c-.05-1.34-.87-2.57-2.49-2.97V5H10.9v1.69c-1.51.32-2.72 1.3-2.72 2.81 0 1.79 1.49 2.69 3.66 3.21 1.95.46 2.34 1.15 2.34 1.87 0 .53-.39 1.39-2.1 1.39-1.6 0-2.23-.72-2.32-1.64H8.04c.1 1.7 1.36 2.66 2.86 2.97V19h2.34v-1.67c1.52-.29 2.72-1.16 2.73-2.77-.01-2.2-1.9-2.96-3.66-3.42z"/></svg>
                        投稿 <span class="meta-val" id="outDate">2023.10.01</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== 视频背景 ==========
    const videoInput = document.getElementById('videoInput');
    const bgVideo = document.getElementById('bgVideo');
    let videoLoaded = false;

    videoInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        bgVideo.src = url;
        bgVideo.classList.add('active');
        bgVideo.load();
        bgVideo.play().catch(() => {});
        videoLoaded = true;
        document.getElementById('capture-target').style.backgroundImage = 'none';
    });

    document.getElementById('bgInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            document.getElementById('capture-target').style.backgroundImage = `url(${ev.target.result})`;
            bgVideo.classList.remove('active');
            bgVideo.pause();
            videoLoaded = false;
        };
        reader.readAsDataURL(file);
    });

    // ========== 缩放 ==========
    function fitCard() {
        const wrapper = document.getElementById('previewWrapper');
        const card = document.getElementById('capture-target');
        if (!wrapper || !card) return;
        const rect = wrapper.getBoundingClientRect();
        const pad = 12;
        const scaleX = (rect.width - pad) / 1280;
        const scaleY = (rect.height - pad) / 720;
        const scale = Math.min(scaleX, scaleY, 1.2);
        card.style.transform = `scale(${scale})`;
        card.style.transformOrigin = 'center center';
    }

    window.addEventListener('resize', fitCard);
    window.addEventListener('load', () => { setTimeout(fitCard, 50); });
    const ro = new ResizeObserver(fitCard);
    ro.observe(document.querySelector('.preview-area'));

    // ========== 数据同步 ==========
    const mapping = {
        'inRank': 'outRank', 'inTitle': 'outTitle', 'inAuthor': 'outAuthor',
        'inTotal': 'outTotal', 'inRate': 'outRate',
        'inPlay': 'outPlay', 'inFav': 'outFav', 'inCoin': 'outCoin',
        'inLike': 'outLike', 'inComment': 'outComment', 'inShare': 'outShare',
        'inLastRank': 'outLastRank', 'inWeeks': 'outWeeks',
        'inPeak': 'outPeak', 'inDate': 'outDate'
    };

    const trendMap = {
        'up': `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 14l5-5 5 5z"/></svg>`,
        'down': `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>`,
        'flat': `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 12h14v2H5z"/></svg>`,
        'new': `<span class="trend-new">✦ NEW</span>`
    };

    function updateAll() {
        for (let [inId, outId] of Object.entries(mapping)) {
            const inEl = document.getElementById(inId);
            const outEl = document.getElementById(outId);
            if (inEl && outEl) outEl.textContent = inEl.value;
        }
        const tv = document.getElementById('inTrend').value;
        const ot = document.getElementById('outTrend');
        if (ot) {
            ot.innerHTML = trendMap[tv] || trendMap['flat'];
            ot.className = 'trend-icon';
            if (tv === 'up') ot.classList.add('trend-up');
            else if (tv === 'down') ot.classList.add('trend-down');
            else if (tv === 'flat') ot.classList.add('trend-flat');
            else if (tv === 'new') ot.classList.add('trend-new');
        }
    }

    document.querySelectorAll('#inRank, #inTitle, #inAuthor, #inTotal, #inRate, #inPlay, #inFav, #inCoin, #inLike, #inComment, #inShare, #inLastRank, #inWeeks, #inPeak, #inDate, #inTrend').forEach(el => {
        el.addEventListener('input', updateAll);
        el.addEventListener('change', updateAll);
    });

    // ========== 导出图片 ==========
    function downloadImage() {
        const target = document.getElementById('capture-target');
        const orig = target.style.transform;
        if (videoLoaded) bgVideo.pause();
        target.style.transform = 'scale(1)';
        target.style.transformOrigin = 'top left';
        html2canvas(target, {
            scale: 2.0,
            useCORS: true,
            allowTaint: true,
            backgroundColor: null,
            width: 1280,
            height: 720
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'VOCALOID_Myth.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            target.style.transform = orig;
            target.style.transformOrigin = 'center center';
            if (videoLoaded) bgVideo.play().catch(() => {});
        }).catch(err => {
            alert('导出失败: ' + err.message);
            target.style.transform = orig;
            target.style.transformOrigin = 'center center';
            if (videoLoaded) bgVideo.play().catch(() => {});
        });
    }

    // ========== 导出视频 (使用 Canvas 逐帧渲染) ==========
    let exportRunning = false;
    let exportStop = false;

    function stopExport() {
        exportStop = true;
    }

    async function exportVideo() {
        if (exportRunning) {
            alert('正在导出中，请稍候...');
            return;
        }

        const target = document.getElementById('capture-target');
        const durationInput = document.getElementById('exportDuration');
        let duration = parseInt(durationInput.value) || 4;
        if (duration < 1) duration = 1;
        if (duration > 60) duration = 60;
        durationInput.value = duration;

        const fps = 30;
        const totalFrames = duration * fps;
        const frameInterval = 1000 / fps;

        // 显示进度条
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        progressBar.classList.add('active');
        progressFill.style.width = '0%';
        document.getElementById('stopBtn').style.display = 'block';
        exportStop = false;
        exportRunning = true;

        try {
            // 创建离屏 Canvas
            const canvas = document.createElement('canvas');
            canvas.width = 1280;
            canvas.height = 720;
            const ctx = canvas.getContext('2d');

            // 准备视频流
            const stream = canvas.captureStream(fps);
            const mediaRecorder = new MediaRecorder(stream, {
                mimeType: 'video/webm;codecs=vp9',
                videoBitsPerSecond: 8000000
            });

            const chunks = [];
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) chunks.push(e.data);
            };

            // 恢复卡片缩放用于渲染
            const origTransform = target.style.transform;
            const origOrigin = target.style.transformOrigin;
            target.style.transform = 'scale(1)';
            target.style.transformOrigin = 'top left';

            // 如果视频背景存在，确保播放
            if (videoLoaded) {
                bgVideo.play().catch(() => {});
            }

            mediaRecorder.start();

            let frameCount = 0;
            const startTime = performance.now();

            while (frameCount < totalFrames) {
                if (exportStop) {
                    console.log('导出已停止');
                    break;
                }

                // 使用 html2canvas 渲染当前帧
                await html2canvas(target, {
                    scale: 1,
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: null,
                    width: 1280,
                    height: 720,
                    logging: false
                }).then(tempCanvas => {
                    ctx.clearRect(0, 0, 1280, 720);
                    ctx.drawImage(tempCanvas, 0, 0, 1280, 720);
                });

                frameCount++;
                const progress = (frameCount / totalFrames) * 100;
                progressFill.style.width = Math.min(progress, 100) + '%';

                // 等待下一帧
                const elapsed = performance.now() - startTime;
                const targetTime = frameCount * frameInterval;
                const waitTime = Math.max(0, targetTime - elapsed);
                await new Promise(resolve => setTimeout(resolve, waitTime));
            }

            // 停止录制
            mediaRecorder.stop();

            // 等待最终数据
            await new Promise(resolve => {
                mediaRecorder.onstop = () => {
                    resolve();
                };
                // 如果已经停止但还没触发，设置超时
                setTimeout(resolve, 1000);
            });

            // 恢复卡片样式
            target.style.transform = origTransform;
            target.style.transformOrigin = origOrigin;

            // 下载视频
            if (chunks.length > 0) {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = `VOCALOID_Myth_${duration}s.webm`;
                link.href = url;
                link.click();
                setTimeout(() => URL.revokeObjectURL(url), 5000);
            } else {
                alert('视频数据为空，请重试');
            }

        } catch (err) {
            alert('视频导出失败: ' + err.message);
            console.error(err);
        } finally {
            exportRunning = false;
            exportStop = false;
            progressBar.classList.remove('active');
            document.getElementById('stopBtn').style.display = 'none';
            if (videoLoaded) {
                bgVideo.play().catch(() => {});
            }
        }
    }

    window.addEventListener('DOMContentLoaded', updateAll);
</script>

</body>
</html>
