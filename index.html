<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOCALOID Myth Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --glass-bg: rgba(255, 255, 255, 0.15); --glass-border: rgba(255, 255, 255, 0.3); }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #121212; color: #fff; display: flex; height: 100vh; overflow: hidden; }
        
        /* 左侧控制面板 */
        .sidebar { width: 320px; min-width: 320px; background: #1e1e1e; border-right: 1px solid #333; padding: 20px; overflow-y: auto; z-index: 10; display: flex; flex-direction: column; gap: 15px; }
        .sidebar h2 { font-size: 18px; margin-bottom: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 12px; color: #888; }
        input[type="text"], input[type="number"], select { background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 6px; font-size: 14px; transition: 0.2s; width: 100%; }
        input:focus, select:focus { border-color: #00d2ff; background: #333; }
        select option { background: #2a2a2a; }

        .file-upload { position: relative; overflow: hidden; display: inline-block; width: 100%; }
        .file-upload input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }
        .btn { background: #333; color: #fff; border: 1px solid #555; padding: 12px; border-radius: 6px; cursor: pointer; text-align: center; font-size: 14px; transition: 0.2s; width: 100%; display: block; }
        .btn:hover { background: #444; border-color: #777; }
        .btn-primary { background: #007bff; border-color: #007bff; color: white; font-weight: bold; margin-top: auto; }
        .btn-primary:hover { background: #0056b3; }

        hr { border:0; border-top:1px solid #333; margin: 10px 0; }

        /* 右侧预览区域 */
        .preview-area { flex: 1; display: flex; justify-content: center; align-items: center; background: #000; position: relative; overflow: hidden; background-image: radial-gradient(#333 1px, transparent 1px); background-size: 20px 20px; }
        
        /* 核心卡片设计 (1280x720) */
        #capture-target {
            width: 1280px; height: 720px;
            background-color: #2c3e50; 
            background-size: cover; background-position: center;
            position: relative; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform-origin: center center;
            display: flex; flex-direction: column;
        }
        
        /* 遮罩层，保证文字清晰 */
        .overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.2) 100%); z-index: 1; }

        .content-layer { position: relative; z-index: 2; padding: 60px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }

        /* 头部信息 */
        .header { display: flex; justify-content: space-between; align-items: flex-start; }
        .rank-info { display: flex; align-items: baseline; gap: 20px; }
        .rank-num { font-size: 120px; font-weight: 900; line-height: 1; color: #fff; text-shadow: 0 4px 10px rgba(0,0,0,0.5); font-style: italic; }
        .trend-icon { font-size: 60px; color: #ff4757; display: flex; align-items: center; justify-content: center; width: 80px; height: 80px; background: rgba(255,255,255,0.1); border-radius: 50%; backdrop-filter: blur(5px); }
        .trend-up { color: #2ed573; } .trend-down { color: #ff4757; transform: rotate(180deg); } .trend-flat { color: #ffa502; }
        
        .song-details { text-align: right; margin-top: 10px; }
        .song-title { font-size: 56px; font-weight: bold; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); margin-bottom: 10px; letter-spacing: 2px; }
        .song-author { font-size: 32px; color: rgba(255,255,255,0.8); font-weight: 500; }

        /* 中间总分玻璃块 */
        .total-score-box {
            align-self: flex-end;
            background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px 50px;
            text-align: right;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }
        .total-label { font-size: 24px; color: rgba(255,255,255,0.7); letter-spacing: 2px; margin-bottom: 5px; }
        .total-points { font-size: 90px; font-weight: 800; color: #fff; line-height: 1; text-shadow: 0 4px 15px rgba(0,0,0,0.3); font-family: 'Arial', sans-serif; }
        .total-rate { font-size: 20px; color: rgba(255,255,255,0.6); margin-top: 5px; }

        /* 底部数据网格 */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: auto; }
        .stat-item {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 20px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .stat-left { display: flex; align-items: center; gap: 15px; }
        .stat-icon { width: 32px; height: 32px; fill: #fff; opacity: 0.9; }
        .stat-name { font-size: 22px; color: rgba(255,255,255,0.8); font-weight: 500; }
        .stat-value { font-size: 32px; font-weight: bold; color: #fff; font-family: 'Arial', sans-serif; }

        /* 底部元数据条 */
        .meta-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.2); }
        .meta-item { font-size: 18px; color: rgba(255,255,255,0.6); display: flex; align-items: center; gap: 8px; }
        .meta-val { color: #fff; font-weight: bold; }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; overflow-y: auto; }
            .sidebar { width: 100%; min-width: auto; height: auto; border-right: none; border-bottom: 1px solid #333; }
            .preview-area { height: 60vh; padding: 20px; align-items: flex-start; overflow-y: auto; }
            #capture-target { transform: scale(0.35); transform-origin: top center; margin-bottom: -400px; }
            .btn-primary { position: fixed; bottom: 20px; right: 20px; width: auto; padding: 15px 30px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,123,255,0.4); z-index: 100; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>数据录入</h2>
    
    <div class="input-group">
        <label>背景图片</label>
        <div class="file-upload btn">
            📁 点击上传背景图
            <input type="file" id="bgInput" accept="image/*">
        </div>
    </div>

    <div class="input-group"><label>当前排名</label><input type="number" id="inRank" value="1"></div>
    <div class="input-group"><label>歌曲名称</label><input type="text" id="inTitle" value="Myth" placeholder="输入歌名"></div>
    <div class="input-group"><label>P主/作者</label><input type="text" id="inAuthor" value="Creator" placeholder="输入作者"></div>
    
    <div class="input-group">
        <label>排名趋势 (up/down/flat)</label>
        <select id="inTrend" style="background:#2a2a2a; color:#fff; padding:10px; border:1px solid #444; border-radius:6px;">
            <option value="up">↑ 上升</option>
            <option value="down">↓ 下降</option>
            <option value="flat">- 持平</option>
            <option value="new">NEW 新曲</option>
        </select>
    </div>

    <hr>

    <div class="input-group"><label>总分 (Total Point)</label><input type="text" id="inTotal" value="1,000,000"></div>
    <div class="input-group"><label>播放数</label><input type="text" id="inPlay" value="100,000"></div>
    <div class="input-group"><label>收藏数</label><input type="text" id="inFav" value="50,000"></div>
    <div class="input-group"><label>投币数</label><input type="text" id="inCoin" value="30,000"></div>
    <div class="input-group"><label>点赞数</label><input type="text" id="inLike" value="40,000"></div>
    <div class="input-group"><label>评论数</label><input type="text" id="inComment" value="5,000"></div>
    <div class="input-group"><label>转发/弹幕</label><input type="text" id="inShare" value="2,000"></div>

    <hr>

    <div class="input-group"><label>上周排名</label><input type="text" id="inLastRank" value="-"></div>
    <div class="input-group"><label>在榜周数</label><input type="text" id="inWeeks" value="1"></div>
    <div class="input-group"><label>最高排名</label><input type="text" id="inPeak" value="1"></div>
    <div class="input-group"><label>投稿日期</label><input type="text" id="inDate" value="2023.10.01"></div>

    <button class="btn btn-primary" onclick="downloadImage()">📸 生成并保存图片</button>
</div>

<div class="preview-area">
    <div id="capture-target">
        <div class="overlay"></div>
        <div class="content-layer">
            
            <div class="header">
                <div class="rank-info">
                    <div class="rank-num" id="outRank">1</div>
                    <div class="trend-icon" id="outTrend">
                        <svg viewBox="0 0 24 24" style="width:40px; height:40px; fill:currentColor;"><path d="M7 14l5-5 5 5z"/></svg>
                    </div>
                </div>
                <div class="song-details">
                    <div class="song-title" id="outTitle">Myth</div>
                    <div class="song-author" id="outAuthor">Creator</div>
                </div>
            </div>

            <div class="total-score-box">
                <div class="total-label">TOTAL POINT</div>
                <div class="total-points" id="outTotal">1,000,000</div>
                <div class="total-rate" id="outRate">Rate: 100%</div>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-left">
                        <svg class="stat-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        <span class="stat-name">播放</span>
                    </div>
                    <span class="stat-value" id="outPlay">100,000</span>
                </div>
                <div class="stat-item">
                    <div class="stat-left">
                        <svg class="stat-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        <span class="stat-name">收藏</span>
                    </div>
                    <span class="stat-value" id="outFav">50,000</span>
                </div>
                <div class="stat-item">
                    <div class="stat-left">
                        <svg class="stat-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-.31-8.86c-1.77-.45-2.34-.94-2.34-1.67 0-.84.79-1.43 2.1-1.43 1.38 0 1.9.66 1.94 1.64h1.71c-.05-1.34-.87-2.57-2.49-2.97V5H10.9v1.69c-1.51.32-2.72 1.3-2.72 2.81 0 1.79 1.49 2.69 3.66 3.21 1.95.46 2.34 1.15 2.34 1.87 0 .53-.39 1.39-2.1 1.39-1.6 0-2.23-.72-2.32-1.64H8.04c.1 1.7 1.36 2.66 2.86 2.97V19h2.34v-1.67c1.52-.29 2.72-1.16 2.73-2.77-.01-2.2-1.9-2.96-3.66-3.42z"/></svg>
                        <span class="stat-name">投币</span>
                    </div>
                    <span class="stat-value" id="outCoin">30,000</span>
                </div>
                <div class="stat-item">
                    <div class="stat-left">
                        <svg class="stat-icon" viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-1.91l-.01-.01L23 10z"/></svg>
                        <span class="stat-name">点赞</span>
                    </div>
                    <span class="stat-value" id="outLike">40,000</span>
                </div>
                <div class="stat-item">
                    <div class="stat-left">
                        <svg class="stat-icon" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
                        <span class="stat-name">评论</span>
                    </div>
                    <span class="stat-value" id="outComment">5,000</span>
                </div>
                <div class="stat-item">
                    <div class="stat-left">
                        <svg class="stat-icon" viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
                        <span class="stat-name">转发</span>
                    </div>
                    <span class="stat-value" id="outShare">2,000</span>
                </div>
            </div>

            <div class="meta-bar">
                <div class="meta-item">上周排名 <span class="meta-val" id="outLastRank">-</span></div>
                <div class="meta-item">在榜 <span class="meta-val" id="outWeeks">1</span> 周</div>
                <div class="meta-item">最高排名 <span class="meta-val" id="outPeak">1</span></div>
                <div class="meta-item">投稿 <span class="meta-val" id="outDate">2023.10.01</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    // 实时同步所有输入
    const mapping = {
        'inRank': 'outRank',
        'inTitle': 'outTitle',
        'inAuthor': 'outAuthor',
        'inTotal': 'outTotal',
        'inPlay': 'outPlay',
        'inFav': 'outFav',
        'inCoin': 'outCoin',
        'inLike': 'outLike',
        'inComment': 'outComment',
        'inShare': 'outShare',
        'inLastRank': 'outLastRank',
        'inWeeks': 'outWeeks',
        'inPeak': 'outPeak',
        'inDate': 'outDate'
    };

    // 趋势图标映射
    const trendMap = {
        'up': '<svg viewBox="0 0 24 24" style="width:40px; height:40px; fill:currentColor;"><path d="M7 14l5-5 5 5z"/></svg>',
        'down': '<svg viewBox="0 0 24 24" style="width:40px; height:40px; fill:currentColor; transform:rotate(180deg);"><path d="M7 14l5-5 5 5z"/></svg>',
        'flat': '<svg viewBox="0 0 24 24" style="width:40px; height:40px; fill:currentColor;"><path d="M5 12h14v2H5z"/></svg>',
        'new': '<span style="font-size:32px; font-weight:bold; color:#ff6b81;">NEW</span>'
    };

    function updateAll() {
        // 文本映射
        for (let [inId, outId] of Object.entries(mapping)) {
            const inEl = document.getElementById(inId);
            const outEl = document.getElementById(outId);
            if (inEl && outEl) {
                outEl.textContent = inEl.value;
            }
        }

        // 趋势特殊处理
        const trendVal = document.getElementById('inTrend').value;
        const outTrend = document.getElementById('outTrend');
        if (outTrend) {
            outTrend.innerHTML = trendMap[trendVal] || trendMap['flat'];
            // 修改颜色
            outTrend.className = 'trend-icon';
            if (trendVal === 'up') outTrend.classList.add('trend-up');
            else if (trendVal === 'down') outTrend.classList.add('trend-down');
            else if (trendVal === 'flat') outTrend.classList.add('trend-flat');
            else if (trendVal === 'new') { outTrend.style.color = '#ff6b81'; }
        }
    }

    // 绑定所有输入事件
    document.querySelectorAll('#inRank, #inTitle, #inAuthor, #inTotal, #inPlay, #inFav, #inCoin, #inLike, #inComment, #inShare, #inLastRank, #inWeeks, #inPeak, #inDate, #inTrend').forEach(el => {
        el.addEventListener('input', updateAll);
        el.addEventListener('change', updateAll);
    });

    // 背景图上传
    document.getElementById('bgInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(ev) {
                document.getElementById('capture-target').style.backgroundImage = `url(${ev.target.result})`;
            };
            reader.readAsDataURL(file);
        }
    });

    // 下载截图
    function downloadImage() {
        const target = document.getElementById('capture-target');
        html2canvas(target, {
            scale: 1.5,
            useCORS: true,
            allowTaint: true,
            backgroundColor: null
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'VOCALOID_Myth.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }).catch(err => {
            alert('生成失败: ' + err.message);
        });
    }

    // 首次加载同步一次
    window.addEventListener('DOMContentLoaded', updateAll);
</script>

</body>
</html>
